title: "Blog d'un Persan chinois"
description: "Trail, musique et entrepreunariat"
url: "https://tkhosravi.github.io"
baseurl: "/tonykhosravi"

remote_theme: "mmistakes/so-simple-theme@3.2.0"

locale: "fr-FR"

# Auteur
author:
  name: "Tony 伊龙 Khosravi Dehkourdi"
  bio: "Développeur web passionné de trail, de musique et d'aventures. En route vers la Diagonale des Fous 🏃‍♂️🇷🇪"
  # picture: "/images/avatar.jpg"  # Ajoute une photo de profil (optionnel)
  links:
    - title: "GitHub"
      url: "https://github.com/tkhosravi"
      icon: "fab fa-github"
    - title: "Strava"
      url: "https://www.strava.com/athletes/tkhosravi"  # Remplace par ton URL Strava
      icon: "fab fa-strava"

# Image Open Graph par défaut pour le partage social
og_image: "/images/2026-04-12-mon-premier-ultra-trail/course.jpg"

# Plugins utiles
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Paramètres du thème
so_simple:
  date_format: "%d %B %Y"      # Format des dates (ex: 12 avril 2026)
  read_time: true              # Affiche le temps de lecture
  words_per_minute: 200        # Mots par minute pour le calcul
  comments: false              # Désactive les commentaires (tu peux les activer plus tard)
  share: true                  # Boutons de partage
  related: true                # Articles similaires en bas de page

# Exclure les fichiers inutiles
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE